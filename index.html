<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search - Happy Birthday!</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #FFF8E1 0%, #FFECB3 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 400;
            color: #333;
            text-align: center;
            max-width: 400px;
            line-height: 1.5;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 20px;
        }

        .game-container {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
            justify-content: center;
        }

        .grid-container {
            background: #fff;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(15, 28px);
            grid-template-rows: repeat(15, 28px);
            gap: 1px;
            user-select: none;
        }

        .cell {
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
            background: #f5f5f5;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .cell:hover {
            background: #e0e0e0;
        }

        .cell.selecting {
            background: #BBDEFB;
            transform: scale(1.1);
        }

        .cell.found-green {
            background: rgba(76, 175, 80, 0.25);
            color: #4CAF50;
        }

        .cell.found-pink {
            background: rgba(236, 64, 122, 0.25);
            color: #EC407A;
        }

        .cell.phrase1 {
            color: #4CAF50;
            font-weight: 700;
        }

        .cell.phrase2 {
            color: #EC407A;
            font-weight: 700;
        }

        .cell.hint-highlight {
            background: #FFEB3B !important;
            animation: pulse 0.5s ease-in-out 4;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .sidebar {
            background: #fff;
            border-radius: 20px;
            padding: 25px;
            min-width: 220px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .stats {
            margin-bottom: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            padding: 8px 0;
            border-bottom: 2px solid #f0f0f0;
        }

        .stat-value {
            font-weight: 700;
            color: #E53935;
        }

        .phrases-section {
            margin-top: 20px;
        }

        .phrases-title {
            font-size: 1rem;
            font-weight: 700;
            color: #666;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .phrase {
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .phrase-1 {
            background: rgba(76, 175, 80, 0.1);
            border: 2px solid #4CAF50;
        }

        .phrase-2 {
            background: rgba(236, 64, 122, 0.1);
            border: 2px solid #EC407A;
        }

        .phrase.hidden {
            filter: blur(5px);
            user-select: none;
        }

        .phrase.revealed {
            animation: reveal 0.5s ease forwards;
        }

        @keyframes reveal {
            from { filter: blur(5px); opacity: 0.5; }
            to { filter: blur(0); opacity: 1; }
        }

        .words-list {
            font-size: 0.9rem;
            line-height: 1.8;
        }

        .word-item {
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .word-item.found {
            opacity: 1;
            color: #4CAF50;
        }

        .hint-btn {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #4CAF50, #EC407A);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: 'Nunito', sans-serif;
        }

        .hint-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4);
        }

        .hint-btn:active {
            transform: translateY(0);
        }

        .celebration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #E53935;
            animation: fall 3s linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <h1>Всё очень просто. Верю, что ты дружишь с английским; если нет — могу переделать на латыни.</h1>
    <p class="subtitle"></p>

    <div class="game-container">
        <div class="grid-container">
            <div class="grid" id="grid"></div>
        </div>

        <div class="sidebar">
            <div class="stats">
                <div class="stat-item">
                    <span>Найдено:</span>
                    <span class="stat-value" id="found">0</span>
                </div>
                <div class="stat-item">
                    <span>Осталось:</span>
                    <span class="stat-value" id="remaining">7</span>
                </div>
            </div>

            <div class="phrases-section">
                <div class="phrases-title">Фразы</div>
                
                <div class="phrase phrase-1" id="phrase1">
                    <div class="words-list">
                        <span class="word-item" data-word="SORRY">SORRY</span> 
                        <span class="word-item" data-word="I">I</span> 
                        <span class="word-item" data-word="WAS">WAS</span> 
                        <span class="word-item" data-word="LATE">LATE</span>
                    </div>
                </div>

                <div class="phrase phrase-2" id="phrase2">
                    <div class="words-list">
                        <span class="word-item" data-word="HAPPY">HAPPY</span> 
                        <span class="word-item" data-word="BIRTHDAY">BIRTHDAY</span> 
                        <span class="word-item" data-word="STASY">STASY</span>
                    </div>
                </div>
            </div>

            <button class="hint-btn" onclick="showHint()">🔍 Подсказка</button>
        </div>
    </div>

    <div class="celebration" id="celebration"></div>

    <script>
        const PHRASE1_WORDS = ['SORRY', 'I', 'WAS', 'LATE'];
        const PHRASE2_WORDS = ['HAPPY', 'BIRTHDAY', 'STASY'];
        const GRID_SIZE = 15;

        let grid = [];
        let foundWords = new Set();
        let isSelecting = false;
        let selectedCells = [];
        let wordPositions = {};

        function initGame() {
            grid = Array(GRID_SIZE).fill(null).map(() => Array(GRID_SIZE).fill(''));
            wordPositions = {};
            
            placeWords();
            fillEmptyCells();
            renderGrid();
            updateStats();
        }

        function placeWords() {
            const allWords = [...PHRASE1_WORDS, ...PHRASE2_WORDS];
            
            const stasyIndex = allWords.indexOf('STASY');
            if (stasyIndex > -1) {
                placeWordDiagonal('STASY', 2);
            }
            
            allWords.forEach(word => {
                if (word === 'STASY') return;
                
                const phrase = PHRASE1_WORDS.includes(word) ? 1 : 2;
                let placed = false;
                let attempts = 0;
                
                while (!placed && attempts < 100) {
                    const direction = Math.random() < 0.5 ? 'horizontal' : 'vertical';
                    const wordLen = word.length;
                    
                    let startRow, startCol;
                    if (direction === 'horizontal') {
                        startRow = Math.floor(Math.random() * GRID_SIZE);
                        startCol = Math.floor(Math.random() * (GRID_SIZE - wordLen + 1));
                    } else {
                        startRow = Math.floor(Math.random() * (GRID_SIZE - wordLen + 1));
                        startCol = Math.floor(Math.random() * GRID_SIZE);
                    }
                    
                    if (canPlaceWord(word, startRow, startCol, direction)) {
                        placeWord(word, startRow, startCol, direction, phrase);
                        placed = true;
                    }
                    attempts++;
                }
            });
        }
        
        function placeWordDiagonal(word, phrase) {
            const wordLen = word.length;
            let placed = false;
            let attempts = 0;
            
            while (!placed && attempts < 100) {
                const startRow = Math.floor(Math.random() * (GRID_SIZE - wordLen + 1));
                const startCol = Math.floor(Math.random() * (GRID_SIZE - wordLen + 1));
                
                if (canPlaceWordDiagonal(word, startRow, startCol)) {
                    const positions = [];
                    for (let i = 0; i < wordLen; i++) {
                        grid[startRow + i][startCol + i] = word[i];
                        positions.push({ row: startRow + i, col: startCol + i });
                    }
                    wordPositions[word] = { positions, phrase };
                    placed = true;
                }
                attempts++;
            }
        }
        
        function canPlaceWordDiagonal(word, startRow, startCol) {
            for (let i = 0; i < word.length; i++) {
                const row = startRow + i;
                const col = startCol + i;
                if (row >= GRID_SIZE || col >= GRID_SIZE) return false;
                if (grid[row][col] !== '' && grid[row][col] !== word[i]) return false;
            }
            return true;
        }

        function canPlaceWord(word, startRow, startCol, direction) {
            for (let i = 0; i < word.length; i++) {
                let row, col;
                if (direction === 'horizontal') {
                    row = startRow;
                    col = startCol + i;
                } else if (direction === 'vertical') {
                    row = startRow + i;
                    col = startCol;
                } else {
                    row = startRow + i;
                    col = startCol + i;
                }
                
                if (row >= GRID_SIZE || col >= GRID_SIZE) return false;
                if (grid[row][col] !== '' && grid[row][col] !== word[i]) return false;
            }
            return true;
        }

        function placeWord(word, startRow, startCol, direction, phrase) {
            const positions = [];
            for (let i = 0; i < word.length; i++) {
                let row, col;
                if (direction === 'horizontal') {
                    row = startRow;
                    col = startCol + i;
                } else {
                    row = startRow + i;
                    col = startCol;
                }
                grid[row][col] = word[i];
                positions.push({ row, col });
            }
            wordPositions[word] = { positions, phrase };
        }

        function fillEmptyCells() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c] === '') {
                        grid[r][c] = letters[Math.floor(Math.random() * letters.length)];
                    }
                }
            }
        }

        function renderGrid() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';
            
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.textContent = grid[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    
                    gridEl.appendChild(cell);
                }
            }
        }

        function getCellElement(row, col) {
            return document.querySelector(`.cell[data-row="${row}"][data-col="${col}"]`);
        }

        function handleCellMouseDown(e) {
            isSelecting = true;
            selectedCells = [];
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            selectCell(row, col);
        }

        function handleCellMouseEnter(e) {
            if (!isSelecting) return;
            const row = parseInt(e.target.dataset.row);
            const col = parseInt(e.target.dataset.col);
            
            if (selectedCells.length > 0) {
                const first = selectedCells[0];
                const last = selectedCells[selectedCells.length - 1];
                
                const isHorizontal = first.row === last.row;
                const isVertical = first.col === last.col;
                const isDiagonal = (row - first.row) === (col - first.col) && Math.abs(row - first.row) === Math.abs(col - first.col);
                
                if (isHorizontal && row === first.row) {
                    clearSelection();
                    for (let c = Math.min(first.col, col); c <= Math.max(first.col, col); c++) {
                        selectCell(first.row, c);
                    }
                } else if (isVertical && col === first.col) {
                    clearSelection();
                    for (let r = Math.min(first.row, row); r <= Math.max(first.row, row); r++) {
                        selectCell(r, first.col);
                    }
                } else if (isDiagonal && row >= first.row) {
                    clearSelection();
                    const step = col > first.col ? 1 : -1;
                    let c = first.col;
                    for (let r = first.row; r <= row; r++) {
                        selectCell(r, c);
                        c += step;
                    }
                }
            }
        }

        function selectCell(row, col) {
            if (!selectedCells.some(c => c.row === row && c.col === col)) {
                selectedCells.push({ row, col });
                getCellElement(row, col).classList.add('selecting');
            }
        }

        function clearSelection() {
            selectedCells.forEach(({ row, col }) => {
                getCellElement(row, col).classList.remove('selecting');
            });
            selectedCells = [];
        }

        function handleMouseUp() {
            if (!isSelecting) return;
            isSelecting = false;
            
            if (selectedCells.length > 0) {
                checkWord();
            }
        }

        function checkWord() {
            const selectedWord = selectedCells.map(c => grid[c.row][c.col]).join('');
            const reversedWord = selectedWord.split('').reverse().join('');
            
            let matchedWord = null;
            if (PHRASE1_WORDS.includes(selectedWord) && !foundWords.has(selectedWord)) {
                matchedWord = selectedWord;
            } else if (PHRASE1_WORDS.includes(reversedWord) && !foundWords.has(reversedWord)) {
                matchedWord = reversedWord;
            } else if (PHRASE2_WORDS.includes(selectedWord) && !foundWords.has(selectedWord)) {
                matchedWord = selectedWord;
            } else if (PHRASE2_WORDS.includes(reversedWord) && !foundWords.has(reversedWord)) {
                matchedWord = reversedWord;
            }
            
            if (matchedWord) {
                foundWords.add(matchedWord);
                markWordFound(matchedWord);
                updateStats();
                checkPhraseComplete();
            }
            
            clearSelection();
        }

        function markWordFound(word) {
            const { positions, phrase } = wordPositions[word];
            positions.forEach(({ row, col }) => {
                const cell = getCellElement(row, col);
                cell.classList.add(phrase === 1 ? 'found-green' : 'found-pink');
            });
            
            const wordItem = document.querySelector(`.word-item[data-word="${word}"]`);
            if (wordItem) {
                wordItem.classList.add('found');
            }
        }

        function updateStats() {
            document.getElementById('found').textContent = foundWords.size;
            document.getElementById('remaining').textContent = 7 - foundWords.size;
        }

        function checkPhraseComplete() {
            const phrase1Complete = PHRASE1_WORDS.every(w => foundWords.has(w));
            const phrase2Complete = PHRASE2_WORDS.every(w => foundWords.has(w));
            
            if (phrase1Complete) {
                document.getElementById('phrase1').classList.remove('hidden');
                document.getElementById('phrase1').classList.add('revealed');
            }
            
            if (phrase2Complete) {
                document.getElementById('phrase2').classList.remove('hidden');
                document.getElementById('phrase2').classList.add('revealed');
            }
            
            if (phrase1Complete && phrase2Complete) {
                setTimeout(() => {
                    alert('🥳');
                    createCelebration();
                }, 500);
            }
        }

        function showHint() {
            const unformedWords = [...PHRASE1_WORDS, ...PHRASE2_WORDS].filter(w => !foundWords.has(w));
            
            if (unformedWords.length === 0) {
                alert('Ты уже нашла все слова!');
                return;
            }
            
            const confirmed = confirm('Пробуй сама, так неинтересно🤪');
            
            if (confirmed) {
                const word = unformedWords[0];
                const { positions } = wordPositions[word];
                const firstPos = positions[0];
                const cell = getCellElement(firstPos.row, firstPos.col);
                
                cell.classList.add('hint-highlight');
                setTimeout(() => {
                    cell.classList.remove('hint-highlight');
                }, 2000);
            }
        }

        function createCelebration() {
            const container = document.getElementById('celebration');
            const colors = ['#E53935', '#EC407A', '#FFEB3B', '#4CAF50', '#2196F3'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.top = '-10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                    container.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        document.getElementById('grid').addEventListener('mousedown', handleCellMouseDown);
        document.getElementById('grid').addEventListener('mouseover', handleCellMouseEnter);
        document.addEventListener('mouseup', handleMouseUp);

        document.getElementById('phrase1').classList.add('hidden');
        document.getElementById('phrase2').classList.add('hidden');

        initGame();
    </script>
</body>
</html>
